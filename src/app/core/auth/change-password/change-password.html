<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-[#F2EDE6] to-[#e8dccb] px-4">

    <div class="w-full max-w-md backdrop-blur-lg bg-white/80 border border-white/40 p-8 rounded-3xl shadow-2xl">
  
      <!-- Header -->
      <div class="text-center mb-8">
        <h2 class="text-3xl font-extrabold text-[#C5A059] tracking-wide">
          Change Password
        </h2>
        <p class="text-sm text-gray-500 mt-2">
          Secure your account by updating your password
        </p>
      </div>
  
      <!-- Form -->
      <form [formGroup]="changeForm" (click)="submit()" class="flex flex-col gap-6">
  
        <!-- Current Password -->
        <div class="relative">
          <input
            type="password"
            formControlName="currentPassword"
            placeholder=" "
            class="peer w-full p-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-[#C5A059]"
          />
          <label class="absolute left-3 top-3 text-gray-400 text-sm transition-all 
            peer-placeholder-shown:top-3 
            peer-placeholder-shown:text-gray-400 
            peer-focus:-top-2 peer-focus:text-xs peer-focus:text-[#C5A059]
            peer-not-placeholder-shown:-top-2 peer-not-placeholder-shown:text-xs 
            peer-focus:bg-white/80 px-1">
            Current Password
          </label>
        </div>
  
        <!-- New Password -->
        <div class="relative">
          <input
            type="password"
            formControlName="newPassword"
            placeholder=" "
            class="peer w-full p-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-[#C5A059]"
          />
          <label class="absolute left-3 top-3 text-gray-400 text-sm transition-all 
            peer-placeholder-shown:top-3 
            peer-focus:-top-2 peer-focus:text-xs peer-focus:text-[#C5A059]
            peer-not-placeholder-shown:-top-2 peer-not-placeholder-shown:text-xs 
            peer-focus:bg-white/80 px-1">
            New Password
          </label>
        </div>
  
        <!-- Confirm Password -->
        <div class="relative">
          <input
            type="password"
            formControlName="confirmNewPassword"
            placeholder=" "
            class="peer w-full p-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-[#C5A059]"
          />
          <label class="absolute left-3 top-3 text-gray-400 text-sm transition-all 
            peer-placeholder-shown:top-3 
            peer-focus:-top-2 peer-focus:text-xs peer-focus:text-[#C5A059]
            peer-not-placeholder-shown:-top-2 peer-not-placeholder-shown:text-xs 
            peer-focus:bg-white/80 px-1">
            Confirm New Password
          </label>
        </div>
  
        <!-- Button -->
        <button
          type="submit"
          class="bg-[#C5A059] text-white p-3 rounded-xl font-semibold tracking-wide
          hover:scale-[1.02] hover:shadow-lg transition-all duration-200"
        >
          Update Password
        </button>
  
      </form>
  
    </div>
  
  </div>
