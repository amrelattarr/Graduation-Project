<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-[#F2EDE6] to-[#e8dccb] px-4">

    <div class="w-full max-w-md backdrop-blur-lg bg-white/80 border border-white/40 p-8 rounded-3xl shadow-2xl">
  
      <!-- Header -->
      <div class="text-center mb-8">
        <h2 class="text-3xl font-extrabold text-[#C5A059] tracking-wide">
          Create Account
        </h2>
      </div>
  
      <!-- Form -->
      <form 
        [formGroup]="registerForm" 
        (ngSubmit)="submit()" 
        class="flex flex-col gap-6"
      >
  
        <!-- Full Name -->
        <div class="relative">
          <input
            type="text"
            formControlName="fullName"
            placeholder=" "
            class="peer w-full p-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-[#C5A059]"
          />
          <label class="absolute left-3 top-3 text-gray-400 text-sm transition-all 
            peer-placeholder-shown:top-3 
            peer-placeholder-shown:text-gray-400 
            peer-focus:-top-2 peer-focus:text-xs peer-focus:text-[#C5A059]
            peer-not-placeholder-shown:-top-2 peer-not-placeholder-shown:text-xs  peer-focus:bg-white/80 px-1">
            Full Name
          </label>
        </div>
  
        <!-- Phone -->
        <div class="relative">
          <input
            type="text"
            formControlName="phone"
            placeholder=" "
            class="peer w-full p-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-[#C5A059]"
          />
          <label class="absolute left-3 top-3 text-gray-400 text-sm transition-all 
            peer-placeholder-shown:top-3 
            peer-focus:-top-2 peer-focus:text-xs peer-focus:text-[#C5A059]
            peer-not-placeholder-shown:-top-2 peer-not-placeholder-shown:text-xs  peer-focus:bg-white/80 px-1">
            Phone Number
          </label>
        </div>
  
        <!-- Email -->
        <div class="relative">
          <input
            type="email"
            formControlName="email"
            placeholder=" "
            class="peer w-full p-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-[#C5A059]"
          />
          <label class="absolute left-3 top-3 text-gray-400 text-sm transition-all 
            peer-placeholder-shown:top-3 
            peer-focus:-top-2 peer-focus:text-xs peer-focus:text-[#C5A059]
            peer-not-placeholder-shown:-top-2 peer-not-placeholder-shown:text-xs  peer-focus:bg-white/80 px-1">
            Email Address
          </label>
        </div>
  
        <!-- Password -->
        <div class="relative">
          <input
            type="password"
            formControlName="password"
            placeholder=" "
            class="peer w-full p-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-[#C5A059]"
          />
          <label class="absolute left-3 top-3 text-gray-400 text-sm transition-all 
            peer-placeholder-shown:top-3 
            peer-focus:-top-2 peer-focus:text-xs peer-focus:text-[#C5A059]
            peer-not-placeholder-shown:-top-2 peer-not-placeholder-shown:text-xs  peer-focus:bg-white/80 px-1">
            Password
          </label>
        </div>
  
<!-- Role Dropdown with visible placeholder -->
<div class="relative">
    <select
      formControlName="role"
      class="peer w-full p-3 pr-10 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-[#C5A059] appearance-none cursor-pointer hover:border-[#C5A059] transition text-gray-400"
    >
      <option value="CharityAdmin" class="text-gray-700">CharityAdmin</option>
      <option value="Volunteer" class="text-gray-700">Volunteer</option>
      <option value="Donor" class="text-gray-700">Donor</option>
    </select>
  
    <!-- Custom arrow -->
    <div class="pointer-events-none absolute inset-y-0 right-3 flex items-center">
      <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
      </svg>
    </div>
  </div>

  
  
        <!-- Button -->
        <button
          type="submit"
          class="mt-2 bg-[#C5A059] text-white p-3 rounded-xl cursor-pointer font-semibold tracking-wide hover:scale-[1.02] hover:shadow-lg transition-all duration-200"
        >
          Register
        </button>
  
      </form>
  
      <!-- Footer -->
      <p class="text-center text-sm text-gray-500 mt-6">
        Already have an account?
        <a routerLink="/login" class="text-[#C5A059] font-semibold hover:underline">
          Login
        </a>
      </p>
  
    </div>
  
  </div>
